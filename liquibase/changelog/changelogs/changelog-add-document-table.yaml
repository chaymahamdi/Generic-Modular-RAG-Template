databaseChangeLog:
  - changeSet:
      id: createDocumentTable
      author: Chayma Hamdi
      changes:
        - createTable:
            ifNotExists: true
            tableName: document
            columns:
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: size
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: creation_date
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: deleted
                  type: BOOLEAN
            primaryKey:
              columnNames: id
            uniqueConstraints:
              - uniqueConstraint:
                  columnNames: id