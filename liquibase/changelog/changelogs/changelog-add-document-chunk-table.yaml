databaseChangeLog:
  - changeSet:
      id: createDocumentChunkTable
      author: Chayma Hamdi
      changes:
        - createTable:
            tableName: document_chunk
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: document_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: chunk_index
                  type: INTEGER
                  constraints:
                    nullable: false

              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: embedding
                  type: vector(768)

              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false

            primaryKey:
              columnNames: id

        - addForeignKeyConstraint:
            baseTableName: document_chunk
            baseColumnNames: document_id
            referencedTableName: document
            referencedColumnNames: id
            constraintName: fk_document_chunk_document
            onDelete: CASCADE